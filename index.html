<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5 lettres sur l'auto-sabotage — Eliot Vincent</title>
<meta name="description" content="5 lettres envoyées dans ta boîte mail sur l'auto-sabotage.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --cream: #F5F0EB;
    --bordeaux: #7A1F2E;
    --bordeaux-light: #B85547;
    --bordeaux-dark: #5A1622;
    --black: #0B0A0D;
    --black-deep: #09080A;
    --glow: #2A1218;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--black);
  }

  body {
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  ::selection { background: var(--bordeaux); color: var(--cream); }

  .page {
    position: relative;
    min-height: 100vh;
    width: 100%;
    background: radial-gradient(ellipse 90% 60% at 50% -10%, var(--glow) 0%, var(--black) 55%, var(--black-deep) 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    box-sizing: border-box;
    padding: 64px 24px 72px;
  }

  /* Identity */
  .identity {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    margin-bottom: 48px;
  }

  .portrait {
    width: 84px;
    height: 84px;
    border-radius: 50%;
    overflow: hidden;
    background: var(--cream);
    flex-shrink: 0;
  }

  .portrait img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: 50% 18%;
    -webkit-mask-image: radial-gradient(circle, #000 68%, transparent 100%);
    mask-image: radial-gradient(circle, #000 68%, transparent 100%);
  }

  .identity-text { text-align: center; }

  .identity-text .name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: 28px;
    line-height: 1.1;
    color: var(--cream);
  }

  .identity-text .role {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 18px;
    color: rgba(245, 240, 235, 0.6);
    margin-top: 4px;
  }

  /* Series banner */
  .series-banner {
    width: 100%;
    max-width: 640px;
    margin-bottom: 48px;
  }

  .series-banner img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* Title */
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: clamp(32px, 6vw, 44px);
    line-height: 1.15;
    letter-spacing: -0.01em;
    color: var(--cream);
    text-align: center;
    white-space: nowrap;
    margin: 0 0 40px;
  }

  h1 em {
    font-style: italic;
    color: var(--bordeaux-light);
  }

  /* Form */
  form {
    width: 100%;
    max-width: 440px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .field-row {
    display: flex;
    gap: 12px;
  }

  .field-row input {
    flex: 1;
    min-width: 0;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(245, 240, 235, 0.27);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    padding: 12px 4px;
    outline: none;
    transition: border-color 0.25s ease;
  }

  .field-row input::placeholder { color: rgba(245, 240, 235, 0.4); }
  .field-row input:focus { border-color: var(--bordeaux-light); }
  .field-row input:focus-visible { outline: none; border-color: var(--bordeaux-light); }

  button.submit {
    background: var(--bordeaux);
    color: var(--cream);
    border: none;
    padding: 15px 24px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: opacity 280ms cubic-bezier(0.32, 0.08, 0.24, 1), background 280ms ease;
  }

  button.submit:hover { opacity: 0.85; }
  button.submit:active { opacity: 0.6; }
  button.submit:focus-visible { outline: 2px solid var(--bordeaux-light); outline-offset: 2px; }
  button.submit:disabled { opacity: 0.5; cursor: default; }
  button.submit.is-submitted { background: var(--bordeaux-dark); }

  .form-message {
    display: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: rgba(245, 240, 235, 0.7);
  }

  .form-message.visible { display: block; }

  /* Closing line */
  .closing {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 18px;
    line-height: 1.55;
    color: rgba(245, 240, 235, 0.7);
    text-align: center;
    max-width: 38ch;
    margin: 40px 0 0;
  }

  @media (prefers-reduced-motion: reduce) {
    button.submit { transition: none; }
  }

  @media (max-width: 480px) {
    .page { padding: 48px 20px 56px; }
    .series-banner { margin-bottom: 36px; }
    .field-row { flex-direction: column; gap: 18px; }
  }
</style>
</head>

  <h1>Recevoir <em>la série</em></h1>

  <form id="optinForm" novalidate>
    <div class="field-row">
      <input type="text" id="prenom" name="fields[first_name]" placeholder="Prénom" autocomplete="given-name" required>
      <input type="email" id="email" name="email_address" placeholder="Email" autocomplete="email" required>
    </div>

    <button type="submit" class="submit" id="submitBtn">Envoyer</button>

    <p class="form-message" id="formMessage"></p>
  </form>

  <p class="closing">À la fin de cette série, tu seras capable de nommer précisément ce qui se passe quand tu entres dans un cycle d'auto-sabotage, et de savoir comment en sortir.</p>

</div>

<script>
  // Intégration Kit (ConvertKit).
  const KIT_FORM_ID = "9698404";
  const KIT_ENDPOINT = `https://app.kit.com/forms/${KIT_FORM_ID}/subscriptions`;

  const form = document.getElementById('optinForm');
  const submitBtn = document.getElementById('submitBtn');
  const formMessage = document.getElementById('formMessage');

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    formMessage.classList.remove('visible');
    formMessage.textContent = '';

    const prenom = document.getElementById('prenom').value.trim();
    const email = document.getElementById('email').value.trim();

    if (!prenom || !email) {
      formMessage.textContent = "Merci de renseigner ton prénom et ton email.";
      formMessage.classList.add('visible');
      return;
    }

    submitBtn.disabled = true;

    const formData = new FormData(form);

    try {
      const response = await fetch(KIT_ENDPOINT, {
        method: 'POST',
        headers: { 'Accept': 'application/json' },
        body: formData
      });

      if (response.ok) {
        form.reset();
        submitBtn.textContent = "C'est noté.";
        submitBtn.classList.add('is-submitted');
        formMessage.textContent = "Va vérifier ta boîte mail pour confirmer ton inscription.";
        formMessage.classList.add('visible');
      } else {
        throw new Error('Request failed');
      }
    } catch (err) {
      formMessage.textContent = "Une erreur s'est produite. Réessaie dans un instant.";
      formMessage.classList.add('visible');
      submitBtn.disabled = false;
    }
  });
</script>
